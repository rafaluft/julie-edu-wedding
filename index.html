<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Julie &amp; Edu · 26 . 11 . 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  main {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
    background: var(--primary);
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 30%;
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(30, 20, 15, 0.25) 0%,
      rgba(30, 20, 15, 0.45) 60%,
      rgba(30, 20, 15, 0.65) 100%
    );
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem;
  }

  .headline {
    color: var(--cream);
    text-align: center;
    animation: fadeInUp 1s ease-out both;
  }

  .eyebrow {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    opacity: 0.8;
    margin: 0;
  }

  .divider-row {
    margin: 2rem 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }

  .divider-line {
    height: 1px;
    width: 3rem;
    background: currentColor;
    opacity: 0.6;
  }

  .names {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 4rem;
    line-height: 1;
    margin: 0;
  }

  .amp {
    margin: 0 0.75rem;
    font-style: italic;
    color: var(--gold);
  }

  .date {
    margin-top: 2.5rem;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    opacity: 0.9;
  }

  @media (min-width: 640px) {
    .names { font-size: 5.5rem; }
  }
  @media (min-width: 768px) {
    .names { font-size: 7rem; }
  }

  .invite-area {
    position: relative;
    margin-top: 3.5rem;
    display: flex;
    width: 100%;
    justify-content: center;
  }

  .envelope-wrap {
    position: relative;
    z-index: 0;
    width: 200px;
  }

  .envelope-img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
    pointer-events: none;
  }

  .seal-pulse {
    position: absolute;
    left: 49.6%;
    top: 56.4%;
    width: 12%;
    aspect-ratio: 1 / 1;
    transform: translate(-50%, -50%);
    border-radius: 9999px;
    box-shadow: 0 0 0 1.5px oklch(0.88 0.03 25 / 0.9);
    animation: sealPulse 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes sealPulse {
    0% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.85; }
    50% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.85; }
  }

  .seal-button {
    position: absolute;
    inset: 0;
    background: transparent;
    border: 0;
    cursor: pointer;
  }

  .card {
    position: absolute;
    left: 50%;
    z-index: 20;
    width: 100%;
    max-width: 560px;
    top: 56%;
    transform: translate(-50%, -56%) scale(0.18);
    transform-origin: 50% 15%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2.6s cubic-bezier(0.16, 1, 0.3, 1),
                transform 2.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card.is-open {
    opacity: 1;
    transform: translate(-50%, -56%) scale(1);
    pointer-events: auto;
  }

  .backface {
    position: relative;
    width: 100%;
  }

  .backface-img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
  }

  .name-button {
    position: absolute;
    background: transparent;
    border: 0;
    cursor: pointer;
    left: 50%;
    top: 51.9%;
    width: 38%;
    height: 16%;
    transform: translate(-50%, -50%);
  }

  .name-contour {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 100%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
    animation: namePulse 4s ease-in-out infinite;
  }

  @keyframes namePulse {
    0% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.9; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(1rem); }
    to { opacity: 1; transform: translateY(0); }
  }

  .headline.is-hidden {
    display: none;
  }
</style>
</head>

<script>
  const headline = document.getElementById('headline');
  const card = document.getElementById('card');
  const openBtn = document.getElementById('openBtn');
  const sealPulse = document.getElementById('sealPulse');
  const enterBtn = document.getElementById('enterBtn');

  openBtn.addEventListener('click', () => {
    headline.classList.add('is-hidden');
    sealPulse.style.display = 'none';
    openBtn.style.display = 'none';
    card.classList.add('is-open');
  });

  enterBtn.addEventListener('click', () => {
    window.location.href = 'home.html';
  });
